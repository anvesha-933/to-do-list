<!DOCTYPE html>
<html>
<head>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;   /* center horizontally */
        align-items: center;       /* center vertically */
        text-align: center;
        font-family: Arial, sans-serif;
    }

    .add-btn {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 16px;
        background-color: rgb(180, 13, 13);
        color: #D4B996;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .add-btn:hover {
        background-color: rgb(255, 0, 0);
    }

    h4 {
        margin-top: 15px;
        font-weight: normal;
        color:rgb(58, 56, 56) ;
    }
</style>
</head>
<body>

<div>
    <img src="circle.png" alt="Image" width="100">

    <h4>
        Capture your tasks, organize your day, and boost your productivity.
    </h4>

    <button class="add-btn">Add Task</button>
</div>

</body>
</html>

</html>
